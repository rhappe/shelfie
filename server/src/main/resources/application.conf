ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [dev.happe.shelfie.server.ApplicationKt.module]
    }
}

database {
    url = ${?DATABASE_URL}
    user = ${?DATABASE_USER}
    password = ${?DATABASE_PASSWORD}
}

jwt {
    secret = ${?JWT_SECRET}
    expiryDays = 90
    expiryDays = ${?JWT_EXPIRY_DAYS}
}
